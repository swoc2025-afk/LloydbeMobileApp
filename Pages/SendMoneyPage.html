<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Send Money</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen send-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="HomePage.html">◀ Back</a>
        <div class="page-title">Who are you sending to?</div>
        <a class="send-add-btn" href="AddRecipientPage.html" aria-label="Add person">Add</a>
      </div>

      <section id="sendRecentsSection" class="section">
        <div class="section-title">
          <span>Recents</span>
        </div>

        <div id="sendRecentsRow" class="send-recents-row"></div>
      </section>

      <section class="section" style="padding-bottom: calc(var(--nav-height) + 12px);">
        <div class="section-title">
          <span>All people</span>
        </div>

        <label class="search send-search" for="sendSearchInput">
          <span aria-hidden="true">🔍</span>
          <input id="sendSearchInput" type="search" placeholder="Search people" autocomplete="off" />
        </label>

        <div id="sendAllList"></div>

        <div id="sendNoResults" class="tx-no-results" hidden>No people match your search.</div>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item active" href="HomePage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <path d="M3 10.5l9-7 9 7" />
          <path d="M5 9.5V20h14V9.5" />
        </svg>
        <span>HOME</span>
      </a>
      <a class="nav-item" href="TrendsPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <circle cx="12" cy="12" r="8" />
          <path d="M12 4v8h8" />
          <path d="M12 12l5.5 5.5" />
        </svg>
        <span>BUDGET</span>
      </a>
      <a class="nav-item social-tab" href="SocialPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="2.8" />
          <circle cx="15.8" cy="8.4" r="2.4" />
          <path d="M3.8 18.7c0-2.6 2.1-4.7 4.7-4.7h5.2c2.6 0 4.7 2.1 4.7 4.7 0 .8-.6 1.5-1.4 1.5H5.2c-.8 0-1.4-.7-1.4-1.5z" />
        </svg>
        <span>SOCIAL</span>
      </a>
      <a class="nav-item challenges-tab" href="ChallengesPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5h8v3.6a4 4 0 0 1-8 0V5z" />
          <path d="M8 7H6.5a2.5 2.5 0 0 0 0 5H8" />
          <path d="M16 7h1.5a2.5 2.5 0 0 1 0 5H16" />
          <path d="M12 12.6V16" />
          <path d="M9.4 19h5.2" />
        </svg>
        <span>CHALLENGES</span>
      </a>
    </nav>

    <script>
      (function () {
        var FRIENDS_KEY = 'lloydbeFriends';
        var REGISTRY_KEY = 'lloydbeTagRegistryV1';
        var NAME_KEY_PREFIX = 'lloydbeSignupNameV1::user::';
        var EMAIL_KEY_PREFIX = 'lloydbeSignupEmailV1::user::';
        var PHONE_KEY_PREFIX = 'lloydbeVerifiedPhoneV1::user::';
        var SEND_RECENTS_KEY = 'lloydbeSendRecentsV1';
        var searchInput = document.getElementById('sendSearchInput');
        var recentsSection = document.getElementById('sendRecentsSection');
        var recentsRow = document.getElementById('sendRecentsRow');
        var list = document.getElementById('sendAllList');
        var noResults = document.getElementById('sendNoResults');

        function initialsFromName(name) {
          var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
          if (parts.length === 0) {
            return 'NA';
          }
          if (parts.length === 1) {
            return parts[0].slice(0, 2).toUpperCase();
          }
          return (parts[0][0] + parts[1][0]).toUpperCase();
        }

        function loadFriends() {
          try {
            var parsed = JSON.parse(localStorage.getItem(FRIENDS_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function loadRegistry() {
          try {
            var parsed = JSON.parse(localStorage.getItem(REGISTRY_KEY) || '{}');
            return parsed && typeof parsed === 'object' ? parsed : {};
          } catch (error) {
            return {};
          }
        }

        function ownerFromHandle(handleValue) {
          var clean = String(handleValue || '').trim().replace(/^@+/, '').toLowerCase();
          if (!clean) {
            return '';
          }
          var registry = loadRegistry();
          return String(registry[clean] || '').trim().toLowerCase();
        }

        function readByOwner(prefix, owner) {
          if (!owner) {
            return '';
          }
          return String(localStorage.getItem(prefix + owner) || '').trim();
        }

        function readNameByOwner(owner) {
          if (!owner) {
            return '';
          }
          try {
            var raw = localStorage.getItem(NAME_KEY_PREFIX + owner);
            var parsed = raw ? JSON.parse(raw) : null;
            if (!parsed || typeof parsed !== 'object') {
              return '';
            }
            var first = String(parsed.firstName || '').trim();
            var last = String(parsed.lastName || '').trim();
            return (first + ' ' + last).trim();
          } catch (error) {
            return '';
          }
        }

        function fullPeopleList() {
          return loadFriends().map(function (friend, idx) {
            var name = String(friend.name || '').trim() || 'Friend';
            var handle = String(friend.handle || '').trim();
            var cleanHandle = handle.replace(/^@+/, '').toLowerCase();
            var owner = ownerFromHandle(cleanHandle);
            var profileName = readNameByOwner(owner);
            var email = readByOwner(EMAIL_KEY_PREFIX, owner).toLowerCase();
            var phone = readByOwner(PHONE_KEY_PREFIX, owner);
            var detailParts = [];
            if (handle) {
              detailParts.push(handle);
            }
            if (phone) {
              detailParts.push(phone);
            } else if (email) {
              detailParts.push(email);
            }
            return {
              id: String(friend.id || cleanHandle || ('friend_' + idx)),
              name: profileName || name,
              owner: owner,
              detail: detailParts.length ? detailParts.join(' · ') : (handle || 'Lloydbe friend'),
              search: [name, profileName, handle, email, phone].join(' ').toLowerCase(),
              initials: initialsFromName(profileName || name),
              color: friend.color || '#d8cdfa'
            };
          });
        }

        function loadRecentIds() {
          try {
            var parsed = JSON.parse(localStorage.getItem(SEND_RECENTS_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function recentPeople(allPeople) {
          var byId = {};
          var ordered = [];
          var recents = loadRecentIds();

          allPeople.forEach(function (person) {
            byId[String(person.id || '')] = person;
          });

          recents.forEach(function (id) {
            var key = String(id || '');
            if (!key || !byId[key]) {
              return;
            }
            ordered.push(byId[key]);
          });

          allPeople.forEach(function (person) {
            if (ordered.indexOf(person) === -1) {
              ordered.push(person);
            }
          });

          return ordered;
        }

        function renderRecents(allPeople) {
          recentsRow.innerHTML = '';

          recentPeople(allPeople).slice(0, 3).forEach(function (person) {
            var card = document.createElement('button');
            card.type = 'button';
            card.className = 'send-recent-card';

            var initials = document.createElement('div');
            initials.className = 'initials';
            initials.style.background = person.color;
            initials.textContent = person.initials;

            var label = document.createElement('strong');
            label.textContent = person.name.split(' ')[0] || person.name;

            card.addEventListener('click', function () {
              openSendDetails(person);
            });

            card.appendChild(initials);
            card.appendChild(label);
            recentsRow.appendChild(card);
          });
        }

        function renderPeople(allPeople) {
          list.innerHTML = '';

          allPeople.forEach(function (person) {
            var row = document.createElement('div');
            row.className = 'list-item send-person';
            row.setAttribute('data-search', person.search);

            var initials = document.createElement('div');
            initials.className = 'initials';
            initials.style.background = person.color;
            initials.textContent = person.initials;

            var details = document.createElement('div');
            details.className = 'details';
            var nameEl = document.createElement('strong');
            nameEl.textContent = person.name;
            var detailEl = document.createElement('small');
            detailEl.textContent = person.detail;
            details.appendChild(nameEl);
            details.appendChild(detailEl);

            var action = document.createElement('button');
            action.className = 'send-next-arrow';
            action.type = 'button';
            action.setAttribute('aria-label', 'Send to ' + person.name);
            action.textContent = '→';
            action.addEventListener('click', function () {
              openSendDetails(person);
            });

            row.appendChild(initials);
            row.appendChild(details);
            row.appendChild(action);
            list.appendChild(row);
          });
        }

        function openSendDetails(person) {
          var params = new URLSearchParams();
          params.set('id', String(person.id || ''));
          params.set('name', person.name || '');
          params.set('detail', person.detail || '');
          params.set('initials', person.initials || '');
          params.set('color', person.color || '');
          params.set('owner', person.owner || '');
          window.location.href = 'SendRecipientPage.html?' + params.toString();
        }

        function filterPeople() {
          var query = (searchInput.value || '').trim().toLowerCase();
          var isSearching = query !== '';
          var people = Array.from(document.querySelectorAll('.send-person'));
          var visibleCount = 0;

          if (recentsSection) {
            recentsSection.hidden = isSearching;
          }

          people.forEach(function (person) {
            var haystack = (person.getAttribute('data-search') || '').toLowerCase();
            var isMatch = !isSearching || haystack.indexOf(query) !== -1;
            person.hidden = !isMatch;
            person.style.display = isMatch ? '' : 'none';
            if (isMatch) {
              visibleCount += 1;
            }
          });

          noResults.hidden = !isSearching || visibleCount > 0;
        }

        var allPeople = fullPeopleList();
        renderRecents(allPeople);
        renderPeople(allPeople);
        searchInput.addEventListener('input', filterPeople);
        filterPeople();
      })();
    </script>
  </body>
</html>
