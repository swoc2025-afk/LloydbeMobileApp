<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account - Home Address</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen auth-screen login-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="CreateAccountDobPage.html">◀ Back</a>
        <div class="page-title">Home Address</div>
        <div style="width: 38px;"></div>
      </div>

      <main class="auth-main auth-main-login">
        <div class="logo-wrap logo-wrap-login" aria-label="Lloydbe logo">
          <img class="logo-image" src="../logo.png" alt="Lloydbe" />
        </div>

        <form id="addressForm" class="login-form" novalidate>
          <p class="auth-helper">Enter your home address.</p>

          <div class="address-input-row" data-target="addressLine1">
            <input id="addressLine1" class="auth-input" type="text" placeholder="Address line 1" autocomplete="address-line1" />
          </div>
          <div class="address-input-row" data-target="addressLine2">
            <input id="addressLine2" class="auth-input" type="text" placeholder="Address line 2 (optional)" autocomplete="address-line2" />
          </div>
          <div class="address-input-row" data-target="addressCity">
            <input id="addressCity" class="auth-input" type="text" placeholder="City" autocomplete="address-level2" />
          </div>
          <div class="address-input-row" data-target="addressPostcode">
            <input id="addressPostcode" class="auth-input" type="text" placeholder="Postcode" autocomplete="postal-code" />
          </div>

          <div id="addressStatus" class="login-status" role="status" aria-live="polite"></div>
          <button id="addressContinueBtn" class="auth-btn" type="submit" disabled>Continue</button>
        </form>
      </main>
    </div>

    <script>
      (function () {
        var ADDRESS_KEY = 'lloydbeSignupAddressV1';
        var form = document.getElementById('addressForm');
        var line1Input = document.getElementById('addressLine1');
        var line2Input = document.getElementById('addressLine2');
        var cityInput = document.getElementById('addressCity');
        var postcodeInput = document.getElementById('addressPostcode');
        var statusEl = document.getElementById('addressStatus');
        var continueBtn = document.getElementById('addressContinueBtn');
        var rows = document.querySelectorAll('.address-input-row');

        rows.forEach(function (row) {
          row.addEventListener('click', function () {
            var targetId = row.getAttribute('data-target');
            var input = targetId ? document.getElementById(targetId) : null;
            if (input) {
              input.focus();
            }
          });
        });

        line1Input.disabled = false;
        line1Input.readOnly = false;
        line2Input.disabled = false;
        line2Input.readOnly = false;
        cityInput.disabled = false;
        cityInput.readOnly = false;
        postcodeInput.disabled = false;
        postcodeInput.readOnly = false;

        function setStatus(message, isError) {
          statusEl.textContent = message || '';
          statusEl.classList.toggle('error', !!isError);
        }

        function clean(value) {
          return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function normalizePostcode(value) {
          return clean(value).toUpperCase();
        }

        function isValidUkPostcode(value) {
          var pc = normalizePostcode(value);
          return /^[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}$/.test(pc);
        }

        function updateValidity() {
          var line1 = clean(line1Input.value);
          var city = clean(cityInput.value);
          var postcode = normalizePostcode(postcodeInput.value);

          var lineAndCityPresent = Boolean(line1 && city);
          var postcodePresent = Boolean(postcode);
          var postcodeValid = isValidUkPostcode(postcode);
          var valid = lineAndCityPresent && postcodeValid;

          continueBtn.disabled = !valid;

          if (!line1 && !city && !postcode) {
            setStatus('', false);
            return;
          }

          if (postcodePresent && !postcodeValid) {
            setStatus('Enter a valid postcode.', true);
            return;
          }

          setStatus('', false);
        }

        [line1Input, cityInput, postcodeInput].forEach(function (input) {
          input.addEventListener('input', updateValidity);
        });

        form.addEventListener('submit', function (event) {
          event.preventDefault();

          var line1 = clean(line1Input.value);
          var line2 = clean(line2Input.value);
          var city = clean(cityInput.value);
          var postcode = normalizePostcode(postcodeInput.value);

          if (!line1 || !city || !isValidUkPostcode(postcode)) {
            continueBtn.disabled = true;
            setStatus('Enter your full home address details.', true);
            return;
          }

          localStorage.setItem(ADDRESS_KEY, JSON.stringify({
            line1: line1,
            line2: line2,
            city: city,
            postcode: postcode,
            savedAt: Date.now()
          }));

          setStatus('Address saved. Continue signup...', false);
          window.setTimeout(function () {
            window.location.href = 'CreateAccountCredentialsPage.html';
          }, 220);
        });
      })();
    </script>
  </body>
</html>
