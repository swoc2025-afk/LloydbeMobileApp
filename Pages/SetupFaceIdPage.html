<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Setup - Face ID</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen auth-screen login-screen">
      <div class="status-bar"><strong>9:41</strong><div class="status-icons"><span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span><span class="network-label">5G</span><span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span></div></div>
      <div class="top-row"><a class="back-link" href="SetupNotificationsPage.html">◀ Back</a><div class="page-title">Account Setup</div><div style="width: 38px;"></div></div>
      <main class="auth-main auth-main-login">
        <div class="setup-steps">
          <div class="setup-step done"><div class="setup-step-num">1</div><div class="setup-step-label">Notifications</div><div class="setup-step-line"></div></div>
          <div class="setup-step active"><div class="setup-step-num">2</div><div class="setup-step-label">Face ID</div><div class="setup-step-line"></div></div>
          <div class="setup-step"><div class="setup-step-num">3</div><div class="setup-step-label">LloydsTag</div><div class="setup-step-line"></div></div>
        </div>
        <section class="setup-card">
          <h2>Enable Face ID</h2>
          <p>Use Face ID for faster, safer logins and payment approvals.</p>
        </section>
      </main>
      <div class="setup-actions setup-actions-single">
        <button id="faceAllow" class="auth-btn" type="button">Allow</button>
        <button id="faceSkip" class="setup-not-now" type="button">Not now</button>
      </div>
    </div>
    <script>
      (function(){
        var KEY='lloydbeSetupPrefsV1';
        function save(v){
          var o={};
          try{o=JSON.parse(localStorage.getItem(KEY)||'{}')||{};}catch(e){}
          Object.assign(o,v);
          localStorage.setItem(KEY,JSON.stringify(o));
          window.location.href='SetupLloydsTagPage.html';
        }
        document.getElementById('faceSkip').addEventListener('click',function(){save({faceId:false});});
        document.getElementById('faceAllow').addEventListener('click',function(){save({faceId:true});});
      })();
    </script>
  </body>
</html>
