    <script>
      (function () {
        var ACCOUNT_BALANCE_KEY = 'lloydbeAccountBalanceV1';
        var ACCOUNT_BALANCE_SEEDED_KEY = 'lloydbeAccountBalanceSeededV1';
        var INITIAL_ACCOUNT_BALANCE = 1000;
        var balanceEl = document.getElementById('homeAccountBalance');
        var TAG_KEY = "lloydbeLloydsTagV1";
        var NAME_KEY = "lloydbeSignupNameV1";
        var CRED_KEY = "lloydbeAuthCredentialV1";

        var avatarEl = document.getElementById("homeAvatarInitials");
        var tagEl = document.getElementById("homeAccountTag");

        function readJSON(key, fallback) {
          try {
            var parsed = JSON.parse(localStorage.getItem(key) || "");
            return parsed && typeof parsed === "object" ? parsed : fallback;
          } catch (error) {
            return fallback;
          }
        }

        function formatMoney(value) {
          var amount = Number(value);
          if (!Number.isFinite(amount)) {
            amount = 0;
          }
          return '£' + amount.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function loadBalance() {
          if (localStorage.getItem(ACCOUNT_BALANCE_SEEDED_KEY) !== '1') {
            localStorage.setItem(ACCOUNT_BALANCE_KEY, String(INITIAL_ACCOUNT_BALANCE));
            localStorage.setItem(ACCOUNT_BALANCE_SEEDED_KEY, '1');
            return INITIAL_ACCOUNT_BALANCE;
          }
          var raw = Number(localStorage.getItem(ACCOUNT_BALANCE_KEY));
          if (Number.isFinite(raw)) {
            return raw;
          }
          localStorage.setItem(ACCOUNT_BALANCE_KEY, String(INITIAL_ACCOUNT_BALANCE));
          return INITIAL_ACCOUNT_BALANCE;
        }

        var tag = String(localStorage.getItem(TAG_KEY) || "").trim();
        var name = readJSON(NAME_KEY, null);
        var credential = readJSON(CRED_KEY, null);

        var first = name && typeof name.firstName === "string" ? name.firstName.trim() : "";
        var last = name && typeof name.lastName === "string" ? name.lastName.trim() : "";

        var rawTag = tag || (credential && credential.username ? String(credential.username) : "User Name");
        var normalizedTag = String(rawTag || "").trim();
        while (normalizedTag.charAt(0) === "@") {
          normalizedTag = normalizedTag.slice(1);
        }
        var displayTag = "@" + (normalizedTag || "User Name");

        var initials = "U";
        if (first && last) {
          initials = (first.charAt(0) + last.charAt(0)).toUpperCase();
        } else if (first) {
          initials = first.charAt(0).toUpperCase();
        }

        if (tagEl) {
          tagEl.textContent = displayTag;
        }
        if (avatarEl) {
          avatarEl.textContent = initials;
        }
        if (balanceEl) {
          balanceEl.textContent = formatMoney(loadBalance());
        }
      })();
    </script>

    <script>
      (function () {
        var TRANSACTIONS_KEY = 'lloydbeTransactionsV1';
        var container = document.getElementById('homeDynamicTransactions');
        var emptyState = document.getElementById('homeNoTransactions');

        if (!container) {
          return;
        }

        function formatMoney(value) {
          var amount = Number(value);
          if (!Number.isFinite(amount)) {
            amount = 0;
          }
          return '£' + amount.toFixed(2);
        }

        function loadTransactions() {
          try {
            var parsed = JSON.parse(localStorage.getItem(TRANSACTIONS_KEY) || '[]');
            if (!Array.isArray(parsed)) {
              return [];
            }
            return parsed.slice().sort(function (a, b) {
              var left = Date.parse(a && a.createdAt ? a.createdAt : '') || 0;
              var right = Date.parse(b && b.createdAt ? b.createdAt : '') || 0;
              return right - left;
            });
          } catch (error) {
            return [];
          }
        }

        function formatRelativeDate(value) {
          var stamp = Date.parse(value || '');
          if (!stamp) {
            return 'Tracked transaction';
          }
          var now = new Date();
          var target = new Date(stamp);
          var diffDays = Math.floor((Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()) - Date.UTC(target.getFullYear(), target.getMonth(), target.getDate())) / 86400000);
          if (diffDays <= 0) {
            return 'Today';
          }
          if (diffDays === 1) {
            return 'Yesterday';
          }
          return diffDays + ' days ago';
        }

        function render() {
          var items = loadTransactions().slice(0, 4);
          container.innerHTML = '';
          if (emptyState) {
            emptyState.hidden = items.length !== 0;
          }

          items.forEach(function (tx) {
            var link = document.createElement('a');
            link.className = 'transaction tx-link-card';
            link.href = 'TransactionDetailPage.html?tx=' + encodeURIComponent(String(tx.id || ''));

            var meta = document.createElement('div');
            meta.className = 'meta';

            var icon = document.createElement('div');
            icon.className = 'icon';
            icon.textContent = tx.icon || '💸';

            var textWrap = document.createElement('div');
            var title = document.createElement('strong');
            title.textContent = tx.name || 'Transfer';
            var sub = document.createElement('div');
            sub.style.color = 'var(--muted)';
            sub.style.fontSize = '11px';
            sub.textContent = formatRelativeDate(tx.createdAt);

            textWrap.appendChild(title);
            textWrap.appendChild(sub);
            meta.appendChild(icon);
            meta.appendChild(textWrap);

            var amount = document.createElement('strong');
            var raw = Number(tx.amount);
            var val = Math.abs(Number.isFinite(raw) ? raw : 0);
            var incoming = tx.direction === 'in';
            amount.textContent = (incoming ? '+' : '-') + formatMoney(val);
            amount.style.color = incoming ? '#24a46d' : '#d45b5b';

            link.appendChild(meta);
            link.appendChild(amount);
            container.appendChild(link);
          });
        }

        render();
      })();
    </script>

    <script>
      (function () {
        var STORAGE_KEY = 'lloydbePots';
        var DEFAULT_OVERRIDE_KEY = 'lloydbeDefaultPotOverrides';
        var ACCOUNT_BALANCE_KEY = 'lloydbeAccountBalanceV1';
        var TRANSACTIONS_KEY = 'lloydbeTransactionsV1';
        var INITIAL_ACCOUNT_BALANCE = 1000;
        var row = document.getElementById('potsRow');
        var count = document.getElementById('potsCount');
        var balanceEl = document.getElementById('homeAccountBalance');
        if (!row || !count) {
          return;
        }

        var colorMap = {
          Forest: 'var(--green-forest)',
          Pine: 'var(--green-pine)',
          Sage: 'var(--green-sage)',
          Jade: 'var(--green-jade)',
          Meadow: 'var(--green-meadow)',
          Evergreen: 'var(--green-evergreen)',
          Peach: 'var(--peach)',
          Lavender: 'var(--lav)',
          Mint: 'var(--mint)',
          Sky: 'var(--blue)',
          Sun: 'var(--sun)',
          Lilac: 'var(--lilac)'
        };

        function formatMoney(value) {
          var amount = Number(value);
          if (!Number.isFinite(amount)) {
            amount = 0;
          }
          return '£' + amount.toFixed(2);
        }

        function roundMoney(value) {
          return Math.round(Number(value) * 100) / 100;
        }

        function getPotProgressPercent(saved, goal) {
          var safeSaved = Math.max(0, Number(saved) || 0);
          var safeGoal = Math.max(0, Number(goal) || 0);
          if (safeGoal <= 0) {
            return 0;
          }
          return Math.min(100, Math.round((safeSaved / safeGoal) * 100));
        }

        function setCardProgress(card, potData) {
          if (!card) {
            return;
          }
          var wrap = card.querySelector('.pot-card-progress');
          if (!wrap) {
            wrap = document.createElement('div');
            wrap.className = 'pot-card-progress';

            var track = document.createElement('div');
            track.className = 'track';
            var fill = document.createElement('span');
            fill.className = 'fill';
            track.appendChild(fill);

            var percent = document.createElement('span');
            percent.className = 'percent';

            wrap.appendChild(track);
            wrap.appendChild(percent);
            card.appendChild(wrap);
          }

          var pct = getPotProgressPercent(
            Number(potData && potData.currentAmount) || 0,
            Number(potData && potData.goal) || 0
          );

          var fillEl = wrap.querySelector('.fill');
          var pctEl = wrap.querySelector('.percent');
          if (fillEl) {
            fillEl.style.width = pct + '%';
          }
          if (pctEl) {
            pctEl.textContent = pct + '%';
          }
        }

        function loadPots() {
          try {
            var parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function loadDefaultOverrides() {
          try {
            var parsed = JSON.parse(localStorage.getItem(DEFAULT_OVERRIDE_KEY) || '{}');
            return parsed && typeof parsed === 'object' ? parsed : {};
          } catch (error) {
            return {};
          }
        }

        function loadTransactions() {
          try {
            var parsed = JSON.parse(localStorage.getItem(TRANSACTIONS_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function saveTransactions(items) {
          localStorage.setItem(TRANSACTIONS_KEY, JSON.stringify(items));
        }

        function getAutosaveIntervalMs(frequency) {
          var value = String(frequency || '').toLowerCase();
          if (value === 'daily') {
            return 24 * 60 * 60 * 1000;
          }
          if (value === 'weekly') {
            return 7 * 24 * 60 * 60 * 1000;
          }
          if (value === 'monthly') {
            return 30 * 24 * 60 * 60 * 1000;
          }
          return 0;
        }

        function processPotAutosaves() {
          var pots = loadPots();
          if (!pots.length) {
            return;
          }

          var balance = Number(localStorage.getItem(ACCOUNT_BALANCE_KEY));
          if (!Number.isFinite(balance)) {
            balance = INITIAL_ACCOUNT_BALANCE;
          }

          var now = Date.now();
          var potsChanged = false;
          var balanceChanged = false;
          var txChanged = false;
          var txList = loadTransactions();
          var txSeq = 0;

          pots.forEach(function (pot) {
            if (!pot || !pot.autosaveOn) {
              return;
            }
            var amount = Number(pot.autosaveAmount);
            var interval = getAutosaveIntervalMs(pot.autosaveFrequency);
            if (!Number.isFinite(amount) || amount <= 0 || !interval) {
              return;
            }

            var lastRun = Number(pot.autosaveLastRunAt);
            if (!Number.isFinite(lastRun) || lastRun <= 0) {
              pot.autosaveLastRunAt = now;
              potsChanged = true;
              return;
            }

            if (now - lastRun < interval) {
              return;
            }

            if (balance >= amount) {
              balance = roundMoney(balance - amount);
              pot.currentAmount = roundMoney((Number(pot.currentAmount) || 0) + amount);
              balanceChanged = true;
              txList.unshift({
                id: 'auto_' + now + '_' + (txSeq++),
                direction: 'out',
                name: 'Auto-save to ' + (pot.name || 'Pot'),
                amount: roundMoney(amount),
                note: 'Automatic transfer to pot',
                icon: '🏦',
                type: 'Auto-save',
                category: 'savings',
                location: 'Lloydbe Pots',
                createdAt: new Date(now).toISOString()
              });
              txChanged = true;
            }

            pot.autosaveLastRunAt = now;
            potsChanged = true;
          });

          if (potsChanged) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(pots));
          }
          if (balanceChanged) {
            localStorage.setItem(ACCOUNT_BALANCE_KEY, String(balance));
            if (balanceEl) {
              balanceEl.textContent = formatMoney(balance);
            }
          }
          if (txChanged) {
            saveTransactions(txList);
          }
        }

        function renderCustomPot(pot) {
          var card = document.createElement('a');
          card.className = 'small-card pot-scroll-item pot-link';
          card.href = 'PotDetailPage.html?id=' + encodeURIComponent(String(pot.id || ''));
          card.style.background = colorMap[pot.color] || 'var(--card)';

          var emoji = document.createElement('div');
          emoji.className = 'pot-emoji';
          emoji.setAttribute('aria-hidden', 'true');
          emoji.textContent = pot.icon || '💰';

          var name = document.createElement('strong');
          name.textContent = pot.name || 'New Pot';

          var goal = document.createElement('span');
          goal.className = 'label';
          goal.textContent = formatMoney(pot.goal);

          card.appendChild(emoji);
          card.appendChild(name);
          card.appendChild(goal);
          setCardProgress(card, pot);
          row.appendChild(card);
        }

        processPotAutosaves();
        var pots = loadPots();

        pots.forEach(renderCustomPot);
        count.textContent = String(pots.length);
      })();
    </script>
