<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account - Email</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen auth-screen login-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="CreateAccountCodePage.html">◀ Back</a>
        <div class="page-title">Your Email</div>
        <div style="width: 38px;"></div>
      </div>

      <main class="auth-main auth-main-login">
        <div class="logo-wrap logo-wrap-login" aria-label="Lloydbe logo">
          <img class="logo-image" src="../logo.png" alt="Lloydbe" />
        </div>

        <form id="emailForm" class="login-form" novalidate>
          <p class="auth-helper">Enter your email address for account updates and recovery.</p>

          <div class="name-input-row" data-target="signupEmail">
            <input id="signupEmail" class="auth-input" type="email" placeholder="Email address" autocomplete="email" autocapitalize="off" spellcheck="false" />
          </div>

          <div id="emailStatus" class="login-status" role="status" aria-live="polite"></div>
          <button id="emailContinueBtn" class="auth-btn" type="submit">Continue</button>
        </form>
      </main>
    </div>

    <script>
      (function () {
        var EMAIL_KEY = 'lloydbeSignupEmailV1';
        var form = document.getElementById('emailForm');
        var emailInput = document.getElementById('signupEmail');
        var statusEl = document.getElementById('emailStatus');
        var continueBtn = document.getElementById('emailContinueBtn');
        var row = document.querySelector('.name-input-row');

        if (row) {
          row.addEventListener('click', function () {
            emailInput.focus();
          });
        }

        function setStatus(message, isError) {
          statusEl.textContent = message || '';
          statusEl.classList.toggle('error', !!isError);
        }

        function isValidEmail(value) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function updateContinueState() {
          continueBtn.disabled = String(emailInput.value || '').trim().length === 0;
        }

        emailInput.disabled = false;
        emailInput.readOnly = false;
        continueBtn.disabled = true;
        emailInput.addEventListener('input', updateContinueState);
        updateContinueState();

        form.addEventListener('submit', function (event) {
          event.preventDefault();

          var email = String(emailInput.value || '').trim().toLowerCase();
          if (!email) {
            setStatus('Enter your email address.', true);
            updateContinueState();
            return;
          }
          if (!isValidEmail(email)) {
            setStatus('Enter a valid email address.', true);
            updateContinueState();
            return;
          }

          localStorage.setItem(EMAIL_KEY, email);
          setStatus('Email saved. Continue signup...', false);
          window.setTimeout(function () {
            window.location.href = 'CreateAccountCountryPage.html';
          }, 220);
        });
      })();
    </script>
  </body>
</html>
