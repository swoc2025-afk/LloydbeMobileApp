<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen chat-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="HomePage.html">◀ Back</a>
        <div class="page-title">Lloydbe chat</div>
        <div style="width: 38px;"></div>
      </div>

      <div id="chatMessages" class="chat-thread chat-thread-plain">
        <div id="chatIntro" class="chat-intro">
          <div style="font-weight: 600; margin-bottom: 10px; color: #55504d;">Personalize Your Saving Goal</div>
          <img src="../logo.png" alt="Lloydbe" class="chat-logo" />
          <div style="font-size: 16px; font-weight: 700; margin-top: 16px;">How can I help?</div>
        </div>
      </div>
    </div>

    <div class="chat-input">
      <span style="color: var(--muted);">🔍</span>
      <input id="chatInput" type="text" placeholder="Message" />
      <button id="sendMessageBtn" type="button" class="icon-btn circle chat-send-btn" style="background: var(--lav);">➤</button>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="HomePage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <path d="M3 10.5l9-7 9 7" />
          <path d="M5 9.5V20h14V9.5" />
        </svg>
        <span>HOME</span>
      </a>
      <a class="nav-item" href="TrendsPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <circle cx="12" cy="12" r="8" />
          <path d="M12 4v8h8" />
          <path d="M12 12l5.5 5.5" />
        </svg>
        <span>BUDGET</span>
      </a>
      <a class="nav-item social-tab" href="SocialPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="2.8" />
          <circle cx="15.8" cy="8.4" r="2.4" />
          <path d="M3.8 18.7c0-2.6 2.1-4.7 4.7-4.7h5.2c2.6 0 4.7 2.1 4.7 4.7 0 .8-.6 1.5-1.4 1.5H5.2c-.8 0-1.4-.7-1.4-1.5z" />
        </svg>
        <span>SOCIAL</span>
      </a>
      <a class="nav-item challenges-tab" href="ChallengesPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5h8v3.6a4 4 0 0 1-8 0V5z" />
          <path d="M8 7H6.5a2.5 2.5 0 0 0 0 5H8" />
          <path d="M16 7h1.5a2.5 2.5 0 0 1 0 5H16" />
          <path d="M12 12.6V16" />
          <path d="M9.4 19h5.2" />
        </svg>
        <span>CHALLENGES</span>
      </a>
    </nav>

    <script>
      (function () {
        var input = document.getElementById('chatInput');
        var sendButton = document.getElementById('sendMessageBtn');
        var thread = document.getElementById('chatMessages');
        var intro = document.getElementById('chatIntro');

        function hideIntroForConversation() {
          if (intro && !intro.hidden) {
            intro.hidden = true;
            thread.classList.add('has-messages');
          }
        }

        function sendMessage() {
          var text = (input.value || '').trim();
          if (!text) {
            return;
          }

          hideIntroForConversation();

          var bubble = document.createElement('div');
          bubble.className = 'chat-user-message';
          bubble.textContent = text;
          thread.appendChild(bubble);

          input.value = '';
          input.focus();
          thread.scrollTop = thread.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
          }
        });
      })();
    </script>
  </body>
</html>
