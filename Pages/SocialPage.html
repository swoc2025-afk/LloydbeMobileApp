<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Social</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen social-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <div class="page-title">Social</div>
        <a class="send-add-btn" href="SocialFriendRequestsPage.html" aria-label="Friend requests">Requests</a>
      </div>

      <section class="section" style="padding-bottom: calc(var(--nav-height) + 12px);">
        <a class="search social-search-input search-launch" href="SocialSearchPage.html" aria-label="Search friends">
          <span aria-hidden="true">🔍</span>
          <span>Search friends...</span>
        </a>

        <div class="chip-row">
          <a class="chip blue social-action-chip" href="SocialAddPage.html">Add</a>
          <a class="chip peach social-action-chip" href="SocialSplitPage.html">Split</a>
          <a class="chip lav social-action-chip" href="SocialNearbyPage.html">Nearby</a>
        </div>

        <div class="section-title">
          <span>Your Friends</span>
          <span id="socialCircleCount" class="pill" style="padding: 4px 10px;">0</span>
        </div>

        <div id="socialFriendsList"></div>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="HomePage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <path d="M3 10.5l9-7 9 7" />
          <path d="M5 9.5V20h14V9.5" />
        </svg>
        <span>HOME</span>
      </a>
      <a class="nav-item" href="TrendsPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <circle cx="12" cy="12" r="8" />
          <path d="M12 4v8h8" />
          <path d="M12 12l5.5 5.5" />
        </svg>
        <span>BUDGET</span>
      </a>
      <a class="nav-item active social-tab" href="SocialPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="2.8" />
          <circle cx="15.8" cy="8.4" r="2.4" />
          <path d="M3.8 18.7c0-2.6 2.1-4.7 4.7-4.7h5.2c2.6 0 4.7 2.1 4.7 4.7 0 .8-.6 1.5-1.4 1.5H5.2c-.8 0-1.4-.7-1.4-1.5z" />
        </svg>
        <span>SOCIAL</span>
      </a>
      <a class="nav-item challenges-tab" href="ChallengesPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5h8v3.6a4 4 0 0 1-8 0V5z" />
          <path d="M8 7H6.5a2.5 2.5 0 0 0 0 5H8" />
          <path d="M16 7h1.5a2.5 2.5 0 0 1 0 5H16" />
          <path d="M12 12.6V16" />
          <path d="M9.4 19h5.2" />
        </svg>
        <span>CHALLENGES</span>
      </a>
    </nav>

    <script>
      (function () {
        var STORAGE_KEY = 'lloydbeFriends';
        var listEl = document.getElementById('socialFriendsList');
        var countEl = document.getElementById('socialCircleCount');

        function loadSavedFriends() {
          try {
            var parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function mergedFriends() {
          var all = loadSavedFriends();
          var seen = {};
          return all.filter(function (friend) {
            var key = String(friend.handle || friend.name || '').toLowerCase();
            if (!key) {
              return true;
            }
            if (seen[key]) {
              return false;
            }
            seen[key] = true;
            return true;
          });
        }

        function formatAmount(friend) {
          if (friend.status === 'plus') {
            return { text: '+£' + Number(friend.amount || 0).toFixed(2), color: '#24a46d' };
          }
          if (friend.status === 'minus') {
            return { text: '-£' + Number(friend.amount || 0).toFixed(2), color: '#d45b5b' };
          }
          return { text: 'Settled', color: 'var(--muted)' };
        }

        function initials(name) {
          var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
          if (!parts.length) {
            return 'NA';
          }
          if (parts.length === 1) {
            return parts[0].slice(0, 2).toUpperCase();
          }
          return (parts[0][0] + parts[1][0]).toUpperCase();
        }

        function render() {
          var friends = mergedFriends();
          listEl.innerHTML = '';

          friends.forEach(function (friend) {
            var amount = formatAmount(friend);

            var row = document.createElement('div');
            row.className = 'list-item social-friend-row';
            row.style.cursor = 'pointer';
            row.setAttribute('role', 'button');
            row.setAttribute('tabindex', '0');
            row.setAttribute('aria-label', 'Open ' + (friend.name || 'friend'));

            var initialsEl = document.createElement('div');
            initialsEl.className = 'initials';
            initialsEl.style.background = friend.color || '#d9cdf8';
            initialsEl.textContent = initials(friend.name);

            var details = document.createElement('div');
            details.className = 'details';

            var nameEl = document.createElement('strong');
            nameEl.textContent = friend.name || 'Friend';

            var handleEl = document.createElement('small');
            handleEl.textContent = ' ' + (friend.handle || '@friend');

            details.appendChild(nameEl);
            details.appendChild(handleEl);

            var amountEl = document.createElement('div');
            amountEl.className = 'amount';
            amountEl.style.color = amount.color;
            amountEl.textContent = amount.text;

            row.appendChild(initialsEl);
            row.appendChild(details);
            row.appendChild(amountEl);

            function openFriendDetail() {
              var params = new URLSearchParams();
              params.set('id', String(friend.id || ''));
              params.set('name', String(friend.name || 'Friend'));
              params.set('handle', String(friend.handle || ''));
              params.set('color', String(friend.color || '#d9cdf8'));
              params.set('initials', initials(friend.name));
              window.location.href = 'SocialFriendDetailPage.html?' + params.toString();
            }

            row.addEventListener('click', openFriendDetail);
            row.addEventListener('keydown', function (event) {
              if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openFriendDetail();
              }
            });
            listEl.appendChild(row);
          });

          countEl.textContent = String(friends.length);
        }

        render();
      })();
    </script>
  </body>
</html>
