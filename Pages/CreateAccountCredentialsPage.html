<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account - Credentials</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen auth-screen login-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="CreateAccountAddressPage.html">◀ Back</a>
        <div class="page-title">Create Login</div>
        <div style="width: 38px;"></div>
      </div>

      <main class="auth-main auth-main-login">
        <div class="logo-wrap logo-wrap-login" aria-label="Lloydbe logo">
          <img class="logo-image" src="../logo.png" alt="Lloydbe" />
        </div>

        <form id="credentialsForm" class="login-form" novalidate>
          <p class="auth-helper">Create your username and password.</p>

          <div class="name-input-row" data-target="signupUsername">
            <input id="signupUsername" class="auth-input" type="text" placeholder="Username" autocomplete="username" autocapitalize="off" spellcheck="false" />
          </div>

          <div class="password-field">
            <input id="signupPassword" class="auth-input" type="password" placeholder="Password" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-target="signupPassword" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <div class="password-field">
            <input id="confirmPassword" class="auth-input" type="password" placeholder="Confirm password" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <div id="credentialsStatus" class="login-status" role="status" aria-live="polite"></div>
          <button id="credentialsContinueBtn" class="auth-btn" type="submit">Continue</button>
        </form>
      </main>
    </div>

    <script>
      (function () {
        var CRED_KEY = 'lloydbeAuthCredentialV1';
        var ATTEMPT_KEY = 'lloydbeAuthAttemptsV1';
        var LAST_USER_KEY = 'lloydbeLastSignupUsernameV1';
        var CURRENT_USER_KEY = 'lloydbeCurrentUserV1';
        var SMS_API_KEY = 'lloydbeSmsApiUrl';
        var API_BASE_KEY = 'lloydbeApiBaseUrl';
        var DEFAULT_API_BASE = 'http://localhost:3001';

        var form = document.getElementById('credentialsForm');
        var usernameInput = document.getElementById('signupUsername');
        var passwordInput = document.getElementById('signupPassword');
        var confirmInput = document.getElementById('confirmPassword');
        var statusEl = document.getElementById('credentialsStatus');
        var nameRows = document.querySelectorAll('.name-input-row');
        var continueBtn = document.getElementById('credentialsContinueBtn');

        function setupPasswordToggles() {
          var buttons = document.querySelectorAll('.password-toggle[data-target]');
          buttons.forEach(function (button) {
            button.addEventListener('click', function () {
              var targetId = button.getAttribute('data-target');
              var input = document.getElementById(targetId);
              if (!input) {
                return;
              }
              var show = input.type === 'password';
              input.type = show ? 'text' : 'password';
              button.textContent = show ? 'Hide' : 'Show';
              button.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
              button.setAttribute('aria-pressed', show ? 'true' : 'false');
            });
          });
        }

        function setStatus(message, isError) {
          statusEl.textContent = message || '';
          statusEl.classList.toggle('error', !!isError);
        }

        function migrateSignupDataToScoped() {
          if (!window.LloydbeUserScope || typeof window.LloydbeUserScope.migrateGlobalToScoped !== 'function') {
            return;
          }
          window.LloydbeUserScope.migrateGlobalToScoped([
            'lloydbeVerifiedPhoneV1',
            'lloydbeSignupEmailV1',
            'lloydbeSignupCountryV1',
            'lloydbeSignupNameV1',
            'lloydbeSignupDobV1',
            'lloydbeSignupAddressV1',
            'lloydbeTermsAcceptedV1'
          ]);
        }

        function updateContinueState() {
          var hasUsername = String(usernameInput.value || '').trim().length > 0;
          var hasPassword = String(passwordInput.value || '').length > 0;
          var hasConfirm = String(confirmInput.value || '').length > 0;
          continueBtn.disabled = !(hasUsername && hasPassword && hasConfirm);
        }

        function isStrongPassword(value) {
          if (value.length < 8) {
            return false;
          }
          var hasLetter = /[A-Za-z]/.test(value);
          var hasNumber = /\d/.test(value);
          return hasLetter && hasNumber;
        }

        function isValidUsername(value) {
          return /^[a-zA-Z0-9_.-]{3,24}$/.test(value);
        }

        function utf8ToHex(str) {
          return Array.from(new TextEncoder().encode(str)).map(function (b) {
            return b.toString(16).padStart(2, '0');
          }).join('');
        }

        async function sha256Hex(value) {
          var bytes = new TextEncoder().encode(String(value || ''));
          var hash = await crypto.subtle.digest('SHA-256', bytes);
          return Array.from(new Uint8Array(hash)).map(function (b) {
            return b.toString(16).padStart(2, '0');
          }).join('');
        }

        async function saveLocalFallbackCredential(username, password) {
          var salt = utf8ToHex(Date.now() + ':' + Math.random()).slice(0, 16);
          var passHash = await sha256Hex(password + ':' + salt);
          localStorage.setItem(CRED_KEY, JSON.stringify({
            username: username,
            passHash: passHash,
            salt: salt
          }));
          localStorage.setItem(ATTEMPT_KEY, JSON.stringify({ count: 0, lockUntil: 0 }));
          localStorage.setItem(LAST_USER_KEY, username);
          localStorage.setItem(CURRENT_USER_KEY, username);
        }

        function deriveBaseUrlFromSmsApi(url) {
          var clean = String(url || '').trim();
          if (!clean) {
            return '';
          }
          var marker = '/api/send-login-code';
          var idx = clean.indexOf(marker);
          if (idx > -1) {
            return clean.slice(0, idx);
          }
          return clean;
        }

        function addUniqueBase(list, value) {
          var clean = String(value || '').trim().replace(/\/+$/, '');
          if (!clean || list.indexOf(clean) !== -1) {
            return;
          }
          list.push(clean);
        }

        function getApiBases() {
          var bases = [];
          var saved = String(localStorage.getItem(API_BASE_KEY) || '').trim();
          var fromSms = deriveBaseUrlFromSmsApi(localStorage.getItem(SMS_API_KEY));

          addUniqueBase(bases, saved);
          addUniqueBase(bases, fromSms);

          if (window && window.location && window.location.hostname) {
            var host = String(window.location.hostname || '').trim();
            var protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
            if (host && host !== 'localhost' && host !== '127.0.0.1') {
              addUniqueBase(bases, protocol + '//' + host + ':3001');
            }
          }

          addUniqueBase(bases, DEFAULT_API_BASE);
          addUniqueBase(bases, 'http://127.0.0.1:3001');
          addUniqueBase(bases, 'http://10.0.2.2:3001');

          return bases;
        }

        function fetchWithTimeout(url, options, timeoutMs) {
          return new Promise(function (resolve, reject) {
            var timer = window.setTimeout(function () {
              reject(new Error('Request timeout'));
            }, timeoutMs);

            fetch(url, options).then(function (response) {
              window.clearTimeout(timer);
              resolve(response);
            }).catch(function (error) {
              window.clearTimeout(timer);
              reject(error);
            });
          });
        }

        async function requestAccountApi(path, options) {
          var bases = getApiBases();
          var timeoutMs = 1200;

          var attempts = bases.map(function (base) {
            return fetchWithTimeout(base + path, options, timeoutMs);
          });

          if (!Promise.any) {
            var lastError = null;
            for (var i = 0; i < attempts.length; i += 1) {
              try {
                return await attempts[i];
              } catch (error) {
                lastError = error;
              }
            }
            throw lastError || new Error('API connection failed');
          }

          try {
            return await Promise.any(attempts);
          } catch (error) {
            throw new Error('API connection failed');
          }
        }

        nameRows.forEach(function (row) {
          row.addEventListener('click', function () {
            var targetId = row.getAttribute('data-target');
            var input = targetId ? document.getElementById(targetId) : null;
            if (input) {
              input.focus();
            }
          });
        });

        usernameInput.disabled = false;
        usernameInput.readOnly = false;
        passwordInput.disabled = false;
        passwordInput.readOnly = false;
        confirmInput.disabled = false;
        confirmInput.readOnly = false;
        continueBtn.disabled = true;

        setupPasswordToggles();

        usernameInput.addEventListener('input', updateContinueState);
        passwordInput.addEventListener('input', updateContinueState);
        confirmInput.addEventListener('input', updateContinueState);
        updateContinueState();

        form.addEventListener('submit', async function (event) {
          event.preventDefault();

          var username = String(usernameInput.value || '').trim();
          var password = String(passwordInput.value || '');
          var confirmPassword = String(confirmInput.value || '');
          if (!username || !password || !confirmPassword) {
            setStatus('Enter username, password, and confirm password.', true);
            updateContinueState();
            return;
          }

          if (!isValidUsername(username)) {
            setStatus('Username must be 3-24 chars (letters, numbers, ., _, -).', true);
            updateContinueState();
            return;
          }

          if (password !== confirmPassword) {
            setStatus('Password and confirm password do not match.', true);
            updateContinueState();
            return;
          }

          if (!isStrongPassword(password)) {
            setStatus('Use 8+ characters with at least one letter and one number.', true);
            updateContinueState();
            return;
          }

          continueBtn.disabled = true;

          try {
            var response = await requestAccountApi('/api/auth/signup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: username,
                password: password
              })
            });

            var payload = null;
            try {
              payload = await response.json();
            } catch (parseError) {
              payload = null;
            }

            if (!response.ok || !payload || payload.ok !== true) {
              setStatus((payload && payload.error) || 'Unable to create account right now.', true);
              return;
            }

            localStorage.setItem(CRED_KEY, JSON.stringify({ username: payload.username || username }));
            localStorage.setItem(ATTEMPT_KEY, JSON.stringify({ count: 0, lockUntil: 0 }));
            localStorage.setItem(LAST_USER_KEY, payload.username || username);
            localStorage.setItem(CURRENT_USER_KEY, payload.username || username);
            migrateSignupDataToScoped();

            setStatus('Account created. Continue setup...', false);
            window.setTimeout(function () {
              window.location.href = 'CreateAccountWelcomePage.html';
            }, 220);
          } catch (error) {
            try {
              await saveLocalFallbackCredential(username, password);
              migrateSignupDataToScoped();
              setStatus('Account created on this device (offline mode).', false);
              window.setTimeout(function () {
                window.location.href = 'CreateAccountWelcomePage.html';
              }, 220);
            } catch (fallbackError) {
              setStatus('Unable to create account right now. Please try again.', true);
            }
          } finally {
            updateContinueState();
          }
        });
      })();
    </script>
  </body>
</html>
