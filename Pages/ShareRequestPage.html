<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Share Request</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen request-share-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="NewRequestPage.html">◀ Back</a>
        <div class="page-title">Request from anyone</div>
        <div style="width: 38px;"></div>
      </div>

      <section class="section">
        <p class="request-share-subtitle">Share a payment link and QR code to get paid by anyone.</p>

        <div class="request-qr-card">
          <div id="requestRealQr" class="real-qr" aria-label="Scannable QR code for ">
            <img class="request-qr-bg-image" src="../logo.png" alt="" aria-hidden="true" />
            <img
              id="requestQrImage"
              class="real-qr-image"
              src="https://api.qrserver.com/v1/create-qr-code/?size=560x560&ecc=H&data=https%3A%2F%2Flloydbe.app%2Fpay%2F%40user_name"
              alt="QR code for "
            />
            <img class="qr-center-logo" src="../logo.png" alt="Lloydbe" />
          </div>
          <div id="requestHandle" class="request-handle"></div>
        </div>

        <button class="request-share-btn" type="button">Share</button>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item active" href="HomePage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <path d="M3 10.5l9-7 9 7" />
          <path d="M5 9.5V20h14V9.5" />
        </svg>
        <span>HOME</span>
      </a>
      <a class="nav-item" href="TrendsPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <circle cx="12" cy="12" r="8" />
          <path d="M12 4v8h8" />
          <path d="M12 12l5.5 5.5" />
        </svg>
        <span>BUDGET</span>
      </a>
      <a class="nav-item social-tab" href="SocialPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="2.8" />
          <circle cx="15.8" cy="8.4" r="2.4" />
          <path d="M3.8 18.7c0-2.6 2.1-4.7 4.7-4.7h5.2c2.6 0 4.7 2.1 4.7 4.7 0 .8-.6 1.5-1.4 1.5H5.2c-.8 0-1.4-.7-1.4-1.5z" />
        </svg>
        <span>SOCIAL</span>
      </a>
      <a class="nav-item challenges-tab" href="ChallengesPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5h8v3.6a4 4 0 0 1-8 0V5z" />
          <path d="M8 7H6.5a2.5 2.5 0 0 0 0 5H8" />
          <path d="M16 7h1.5a2.5 2.5 0 0 1 0 5H16" />
          <path d="M12 12.6V16" />
          <path d="M9.4 19h5.2" />
        </svg>
        <span>CHALLENGES</span>
      </a>
    </nav>

    <script>
      (function () {
        var TAG_KEY = "lloydbeLloydsTagV1";
        var CRED_KEY = "lloydbeAuthCredentialV1";
        var CURRENT_USER_KEY = "lloydbeCurrentUserV1";

        var handleEl = document.getElementById("requestHandle");
        var qrWrapEl = document.getElementById("requestRealQr");
        var qrImageEl = document.getElementById("requestQrImage");

        if (!handleEl || !qrWrapEl || !qrImageEl) {
          return;
        }

        function readJson(key, fallback) {
          try {
            var parsed = JSON.parse(localStorage.getItem(key) || "");
            return parsed && typeof parsed === "object" ? parsed : fallback;
          } catch (error) {
            return fallback;
          }
        }

        function normalizeTag(value) {
          return String(value || "").trim().replace(/^@+/, "");
        }

        var rawTag = normalizeTag(localStorage.getItem(TAG_KEY) || "");
        var cred = readJson(CRED_KEY, {});
        var fallbackUser = normalizeTag(localStorage.getItem(CURRENT_USER_KEY) || cred.username || "user_name");
        var finalTag = rawTag || fallbackUser || "user_name";
        var displayHandle = "@" + finalTag;
        var payLink = "https://lloydbe.app/pay/" + displayHandle;

        handleEl.textContent = displayHandle;
        qrWrapEl.setAttribute("aria-label", "Scannable QR code for " + displayHandle);
        qrImageEl.setAttribute("alt", "QR code for " + displayHandle);
        qrImageEl.src = "https://api.qrserver.com/v1/create-qr-code/?size=560x560&ecc=H&data=" + encodeURIComponent(payLink);
      })();
    </script>
  </body>
</html>
