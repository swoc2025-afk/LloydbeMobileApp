<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Request</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen request-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="HomePage.html">◀ Back</a>
        <div class="page-title">New Request</div>
        <div style="width: 38px;"></div>
      </div>

      <section class="section">
        <a class="search request-search search-launch" href="RequestSearchPage.html" aria-label="Search name, email, phone">
          <span aria-hidden="true">🔍</span>
          <span>Search name, email, phone</span>
        </a>

        <div id="requestDefaultArea">
          <div class="request-link-card">
            <div>
              <strong>Share a link</strong>
              <div class="request-link-sub">Anyone can pay through your request link.</div>
            </div>
            <a class="request-link-arrow" href="ShareRequestPage.html" aria-label="Open share link">➜</a>
          </div>

          <div class="section-title">
            <span>Recent people</span>
          </div>

          <div class="list-item">
            <div class="initials" style="background: #ffcfa8;">AM</div>
            <div class="details">
              <strong>Amy Miller</strong>
              <small>Last sent £25.00</small>
            </div>
            <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Amy Miller">→</button>
          </div>

          <div class="list-item">
            <div class="initials" style="background: #a8c8ff;">JD</div>
            <div class="details">
              <strong>John Doe</strong>
              <small>Last sent £12.50</small>
            </div>
            <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from John Doe">→</button>
          </div>

          <div class="list-item" style="margin-bottom: calc(var(--nav-height) + 12px);">
            <div class="initials" style="background: #f4b7d6;">SL</div>
            <div class="details">
              <strong>Sarah Lee</strong>
              <small>Last sent £8.50</small>
            </div>
            <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Sarah Lee">→</button>
          </div>
        </div>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item active" href="HomePage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <path d="M3 10.5l9-7 9 7" />
          <path d="M5 9.5V20h14V9.5" />
        </svg>
        <span>HOME</span>
      </a>
      <a class="nav-item" href="TrendsPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7">
          <circle cx="12" cy="12" r="8" />
          <path d="M12 4v8h8" />
          <path d="M12 12l5.5 5.5" />
        </svg>
        <span>BUDGET</span>
      </a>
      <a class="nav-item social-tab" href="SocialPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="2.8" />
          <circle cx="15.8" cy="8.4" r="2.4" />
          <path d="M3.8 18.7c0-2.6 2.1-4.7 4.7-4.7h5.2c2.6 0 4.7 2.1 4.7 4.7 0 .8-.6 1.5-1.4 1.5H5.2c-.8 0-1.4-.7-1.4-1.5z" />
        </svg>
        <span>SOCIAL</span>
      </a>
      <a class="nav-item challenges-tab" href="ChallengesPage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 5h8v3.6a4 4 0 0 1-8 0V5z" />
          <path d="M8 7H6.5a2.5 2.5 0 0 0 0 5H8" />
          <path d="M16 7h1.5a2.5 2.5 0 0 1 0 5H16" />
          <path d="M12 12.6V16" />
          <path d="M9.4 19h5.2" />
        </svg>
        <span>CHALLENGES</span>
      </a>
    </nav>

    <script>
      (function () {
        var buttons = Array.from(document.querySelectorAll('.request-next-arrow'));

        buttons.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var row = btn.closest('.list-item');
            var nameEl = row ? row.querySelector('.details strong') : null;
            var personName = nameEl ? (nameEl.textContent || '').trim() : 'Friend';
            var detailEl = row ? row.querySelector('.details small') : null;
            var initialsEl = row ? row.querySelector('.initials') : null;
            var params = new URLSearchParams();
            params.set('source', 'newrequest');
            params.set('name', personName);
            params.set('detail', detailEl ? (detailEl.textContent || '').trim() : '');
            params.set('initials', initialsEl ? (initialsEl.textContent || '').trim() : '');
            params.set('color', initialsEl ? (initialsEl.style.background || '') : '');
            window.location.href = 'RequestRecipientPage.html?' + params.toString();
          });
        });
      })();
    </script>
  </body>
</html>
