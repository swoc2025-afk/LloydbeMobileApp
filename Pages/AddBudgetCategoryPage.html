<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Budget Category</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen budget-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <div class="top-row">
        <a class="back-link" href="TrendsPage.html">◀ Back</a>
        <div class="page-title">Add Category</div>
        <div style="width: 38px;"></div>
      </div>

      <section class="section" style="padding-bottom: calc(var(--nav-height) + 12px);">
        <form id="addBudgetCategoryForm" class="create-pot-form">
          <label class="field-block" for="categoryNameInput">
            <span class="field-title">Category name</span>
            <input id="categoryNameInput" class="input" type="text" placeholder="e.g. Subscriptions" required />
          </label>

          <label class="field-block" for="categoryEmojiInput">
            <span class="field-title">Emoji</span>
            <input id="categoryEmojiInput" class="input" type="text" placeholder="🎵" maxlength="2" required readonly />
            <div id="categoryEmojiPicker" class="emoji-picker-grid" hidden>
              <button type="button">😀</button><button type="button">😁</button><button type="button">😂</button><button type="button">😍</button><button type="button">😎</button><button type="button">🥳</button>
              <button type="button">🍔</button><button type="button">🍕</button><button type="button">☕</button><button type="button">🎬</button><button type="button">🎵</button><button type="button">🎮</button>
              <button type="button">🛍️</button><button type="button">🧾</button><button type="button">💡</button><button type="button">🏠</button><button type="button">🚗</button><button type="button">🚌</button>
              <button type="button">✈️</button><button type="button">📱</button><button type="button">💻</button><button type="button">💊</button><button type="button">💗</button><button type="button">🏋️</button>
              <button type="button">🎁</button><button type="button">🧩</button><button type="button">📚</button><button type="button">🌱</button><button type="button">🐶</button><button type="button">⭐</button>
            </div>
          </label>

          <label class="field-block" for="categoryColorInput">
            <span class="field-title">Color</span>
            <div class="color-picker" role="radiogroup" aria-label="Choose category color">
              <input id="category-color-forest" type="radio" name="categoryColorChoice" value="#0a7b58" checked />
              <label class="color-swatch" for="category-color-forest" style="--swatch: var(--green-forest);" aria-label="Forest"></label>

              <input id="category-color-pine" type="radio" name="categoryColorChoice" value="#005a3c" />
              <label class="color-swatch" for="category-color-pine" style="--swatch: var(--green-pine);" aria-label="Pine"></label>

              <input id="category-color-sage" type="radio" name="categoryColorChoice" value="#b7e3b2" />
              <label class="color-swatch" for="category-color-sage" style="--swatch: var(--green-sage);" aria-label="Sage"></label>

              <input id="category-color-jade" type="radio" name="categoryColorChoice" value="#1fba7a" />
              <label class="color-swatch" for="category-color-jade" style="--swatch: var(--green-jade);" aria-label="Jade"></label>

              <input id="category-color-meadow" type="radio" name="categoryColorChoice" value="#1ec389" />
              <label class="color-swatch" for="category-color-meadow" style="--swatch: var(--green-meadow);" aria-label="Meadow"></label>

              <input id="category-color-evergreen" type="radio" name="categoryColorChoice" value="#0b6f4d" />
              <label class="color-swatch" for="category-color-evergreen" style="--swatch: var(--green-evergreen);" aria-label="Evergreen"></label>
            </div>
          </label>

          <label class="field-block" for="categoryLimitInput">
            <span class="field-title">Monthly budget (£)</span>
            <input id="categoryLimitInput" class="input" type="number" min="1" step="1" placeholder="50" required />
          </label>

          <label class="field-block" for="categoryTagsInput">
            <span class="field-title">Keywords (optional)</span>
            <input id="categoryTagsInput" class="input" type="text" placeholder="music, streaming, apps" />
          </label>

          <label class="field-block" for="categoryNoteInput">
            <span class="field-title">Description (optional)</span>
            <input id="categoryNoteInput" class="input" type="text" placeholder="Monthly subscriptions and app costs" />
          </label>

          <button id="saveBudgetCategoryBtn" class="btn primary" type="submit" style="margin-top: 10px;">Add category</button>
        </form>
      </section>
    </div>

    <script>
      (function () {
        var KEY = 'lloydbeBudgetCategoriesV1';
        var form = document.getElementById('addBudgetCategoryForm');
        var saveBtn = document.getElementById('saveBudgetCategoryBtn');
        var nameInput = document.getElementById('categoryNameInput');
        var emojiInput = document.getElementById('categoryEmojiInput');
        var emojiPicker = document.getElementById('categoryEmojiPicker');
        var colorRadios = Array.from(document.querySelectorAll('input[name="categoryColorChoice"]'));
        var limitInput = document.getElementById('categoryLimitInput');
        var tagsInput = document.getElementById('categoryTagsInput');
        var noteInput = document.getElementById('categoryNoteInput');

        function openEmojiPicker() {
          if (!emojiPicker) {
            return;
          }
          emojiPicker.hidden = false;
          emojiPicker.style.display = 'grid';
        }

        function closeEmojiPicker() {
          if (!emojiPicker) {
            return;
          }
          emojiPicker.hidden = true;
          emojiPicker.style.display = 'none';
        }

        function getSelectedColor() {
          var selected = colorRadios.find(function (radio) {
            return radio.checked;
          });
          return selected ? selected.value : '#0a7b58';
        }

        function slugify(value) {
          return String(value || '')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .slice(0, 32);
        }

        function loadCategories() {
          try {
            var parsed = JSON.parse(localStorage.getItem(KEY) || '[]');
            return Array.isArray(parsed) ? parsed : [];
          } catch (error) {
            return [];
          }
        }

        function saveCategories(categories) {
          localStorage.setItem(KEY, JSON.stringify(categories));
        }

        if (emojiInput) {
          emojiInput.addEventListener('click', function () {
            openEmojiPicker();
          });
          emojiInput.addEventListener('focus', function () {
            openEmojiPicker();
          });
        }

        if (emojiPicker) {
          emojiPicker.addEventListener('click', function (event) {
            var target = event.target;
            if (!target || target.tagName !== 'BUTTON') {
              return;
            }
            emojiInput.value = target.textContent || '';
            closeEmojiPicker();
          });
        }

        document.addEventListener('click', function (event) {
          if (!emojiPicker || emojiPicker.hidden) {
            return;
          }
          var target = event.target;
          if (target === emojiInput || emojiPicker.contains(target)) {
            return;
          }
          closeEmojiPicker();
        });

        form.addEventListener('submit', function (event) {
          event.preventDefault();

          var name = (nameInput.value || '').trim();
          var emoji = (emojiInput.value || '').trim();
          var color = getSelectedColor();
          var limit = Number(limitInput.value);
          var tagsRaw = (tagsInput.value || '').trim();
          var note = (noteInput.value || '').trim();

          if (!name || !emoji || !Number.isFinite(limit) || limit <= 0) {
            return;
          }

          var categories = loadCategories();
          var id = 'custom_' + (slugify(name) || Date.now());
          var exists = categories.some(function (item) {
            return String(item.id || '').toLowerCase() === id.toLowerCase();
          });
          if (exists) {
            id = id + '_' + Date.now();
          }

          categories.unshift({
            id: id,
            name: name,
            emoji: emoji,
            color: color,
            limit: Math.round(limit),
            spent: 0,
            lastMonthSpent: 0,
            tags: tagsRaw ? tagsRaw.split(',').map(function (s) { return s.trim().toLowerCase(); }).filter(Boolean) : [slugify(name)],
            description: note
          });

          saveCategories(categories.slice(0, 30));
          saveBtn.textContent = 'Added';
          window.setTimeout(function () {
            window.location.href = 'TrendsPage.html';
          }, 350);
        });

      })();
    </script>
  </body>
</html>
