<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search People</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../user-scope.js"></script>
  </head>
  <body>
    <div class="screen search-only-screen">
      <div class="status-bar">
        <strong>9:41</strong>
        <div class="status-icons">
          <span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
          <span class="network-label">5G</span>
          <span class="battery-icon" aria-hidden="true"><span class="battery-level"></span></span>
        </div>
      </div>

      <section class="section search-only-top">
        <button id="requestSearchBack" class="search-back-arrow" type="button" aria-label="Go back">←</button>
        <label class="search request-search search-input-row" for="requestSearchInput">
          <span aria-hidden="true">🔍</span>
          <input id="requestSearchInput" type="search" placeholder="Search name, email, phone" autocomplete="off" />
        </label>
      </section>

      <section id="requestResults" class="section search-results-stack">
        <div class="list-item request-person" data-search="amy miller amy.miller@email.com 07700 900111" hidden>
          <div class="initials" style="background: #ffcfa8;">AM</div>
          <div class="details">
            <strong>Amy Miller</strong>
            <small>amy.miller@email.com · 07700 900111</small>
          </div>
          <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Amy Miller">→</button>
        </div>

        <div class="list-item request-person" data-search="john doe john.doe@email.com 07700 900222" hidden>
          <div class="initials" style="background: #a8c8ff;">JD</div>
          <div class="details">
            <strong>John Doe</strong>
            <small>john.doe@email.com · 07700 900222</small>
          </div>
          <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from John Doe">→</button>
        </div>

        <div class="list-item request-person" data-search="zoe smith zoe.smith@email.com 07700 900333" hidden>
          <div class="initials" style="background: #cbb8ff;">ZS</div>
          <div class="details">
            <strong>Zoe Smith</strong>
            <small>zoe.smith@email.com · 07700 900333</small>
          </div>
          <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Zoe Smith">→</button>
        </div>

        <div class="list-item request-person" data-search="ben king ben.king@email.com 07700 900555" hidden>
          <div class="initials" style="background: #f6c3a0;">BK</div>
          <div class="details">
            <strong>Ben King</strong>
            <small>ben.king@email.com · 07700 900555</small>
          </div>
          <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Ben King">→</button>
        </div>

        <div class="list-item request-person" data-search="sarah lee sarah.lee@email.com 07700 900444" hidden>
          <div class="initials" style="background: #f4b7d6;">SL</div>
          <div class="details">
            <strong>Sarah Lee</strong>
            <small>sarah.lee@email.com · 07700 900444</small>
          </div>
          <button class="send-next-arrow request-next-arrow" type="button" aria-label="Request from Sarah Lee">→</button>
        </div>

        <div id="requestNoResults" class="tx-no-results" hidden>No people match your search.</div>
      </section>
    </div>

    <script>
      (function () {
        var backBtn = document.getElementById('requestSearchBack');
        var searchInput = document.getElementById('requestSearchInput');
        var people = Array.from(document.querySelectorAll('.request-person'));
        var noResults = document.getElementById('requestNoResults');

        function goBack() {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = 'NewRequestPage.html';
          }
        }

        function filterPeople() {
          var query = (searchInput.value || '').trim().toLowerCase();
          if (query === '') {
            people.forEach(function (person) {
              person.hidden = true;
            });
            noResults.hidden = true;
            return;
          }

          var visibleCount = 0;
          people.forEach(function (person) {
            var haystack = (person.dataset.search || '').toLowerCase();
            var isMatch = haystack.indexOf(query) !== -1;
            person.hidden = !isMatch;
            if (isMatch) {
              visibleCount += 1;
            }
          });

          noResults.hidden = visibleCount > 0;
        }

        backBtn.addEventListener('click', goBack);
        searchInput.addEventListener('input', filterPeople);
        people.forEach(function (person) {
          var button = person.querySelector('.request-next-arrow');
          if (!button) {
            return;
          }
          button.addEventListener('click', function () {
            var nameEl = person.querySelector('.details strong');
            var personName = nameEl ? (nameEl.textContent || '').trim() : 'Friend';
            var detailEl = person.querySelector('.details small');
            var initialsEl = person.querySelector('.initials');
            var params = new URLSearchParams();
            params.set('source', 'requestsearch');
            params.set('name', personName);
            params.set('detail', detailEl ? (detailEl.textContent || '').trim() : '');
            params.set('initials', initialsEl ? (initialsEl.textContent || '').trim() : '');
            params.set('color', initialsEl ? (initialsEl.style.background || '') : '');
            window.location.href = 'RequestRecipientPage.html?' + params.toString();
          });
        });
        searchInput.focus();
      })();
    </script>
  </body>
</html>
